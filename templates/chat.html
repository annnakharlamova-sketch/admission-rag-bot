<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат-бот приёмной комиссии МТУСИ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .year {
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .commands-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .commands-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .commands-panel {
            background: #f5f5f5;
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            border-bottom: 1px solid #ddd;
        }

        .commands-panel.show {
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .command-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #ddd;
        }

        .command-item:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 5px;
            color: #999;
        }

        .message.user .message-time {
            text-align: right;
        }

        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .chat-input input:focus {
            border-color: #667eea;
        }

        .chat-input button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-input button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .source-badge {
            font-size: 0.7rem;
            background: #eee;
            color: #666;
            padding: 2px 8px;
            border-radius: 12px;
            margin-top: 5px;
            display: inline-block;
        }

        .message.assistant .source-badge {
            background: #e0e7ff;
            color: #667eea;
        }

        .context {
            font-size: 0.85rem;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            color: #666;
            border-left: 3px solid #667eea;
        }

        details {
            margin-top: 10px;
        }

        details summary {
            cursor: pointer;
            color: #667eea;
            font-size: 0.85rem;
        }

        .clear-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .clear-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .welcome-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .chat-container {
                height: 95vh;
            }

            .message-content {
                max-width: 85%;
            }

            .commands-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>
                🎓 Помощник МТУСИ
                <span class="year">{{ current_year }}</span>
            </h1>
            <div>
                <button class="commands-toggle" onclick="toggleCommands()">📋 Команды</button>
                <button class="clear-btn" onclick="clearHistory()" title="Очистить историю">🗑️</button>
            </div>
        </div>

        <div class="commands-panel" id="commandsPanel">
            <div class="commands-grid" id="commandsList">
                Загрузка команд...
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                {{ welcome_message }}<br><br>
                Задайте любой вопрос о поступлении в МТУСИ!
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Напишите ваш вопрос..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendButton">
                <span>Отправить</span>
                <span>➤</span>
            </button>
        </div>
    </div>

    <script>
        const user_id = '{{ user_id }}';
        let isLoading = false;

        // Загрузка команд при старте
        fetch('/api/quick_commands')
            .then(res => res.json())
            .then(commands => {
                const commandsList = document.getElementById('commandsList');
                commandsList.innerHTML = commands.map(cmd =>
                    `<div class="command-item" onclick="useCommand('${cmd.cmd}')">
                        ${cmd.desc}
                    </div>`
                ).join('');
            });

        // Загрузка истории
        fetch(`/api/history?user_id=${user_id}`)
            .then(res => res.json())
            .then(data => {
                if (data.history && data.history.length > 0) {
                    document.querySelector('.welcome-message').style.display = 'none';
                    data.history.forEach(msg => addMessageToChat(msg.content, msg.role, msg.time, msg.source));
                }
            });

        function toggleCommands() {
            const panel = document.getElementById('commandsPanel');
            panel.classList.toggle('show');
        }

        function useCommand(cmd) {
            document.getElementById('messageInput').value = cmd;
            sendMessage();
            document.getElementById('commandsPanel').classList.remove('show');
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function addMessageToChat(content, role, time, source) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            // Скрываем приветствие при первом сообщении
            document.querySelector('.welcome-message').style.display = 'none';

            let sourceBadge = '';
            if (role === 'assistant' && source) {
                const sourceNames = {
                    'simple': '🤖 Быстрый ответ',
                    'fallback': '📚 База знаний',
                    'unknown': '🔍 Общий ответ'
                };
                sourceBadge = `<div class="source-badge">${sourceNames[source] || source}</div>`;
            }

            messageDiv.innerHTML = `
                <div class="message-content">${content}</div>
                ${sourceBadge}
                <div class="message-time">${time}</div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) {
                typingDiv.remove();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || isLoading) return;

            input.value = '';
            isLoading = true;
            document.getElementById('sendButton').disabled = true;

            // Добавляем сообщение пользователя
            const time = new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
            addMessageToChat(message, 'user', time);

            // Показываем индикатор печати
            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: user_id,
                        message: message
                    })
                });

                const data = await response.json();

                // Убираем индикатор
                removeTypingIndicator();

                // Добавляем ответ
                addMessageToChat(data.answer, 'assistant', new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'}), data.source);

            } catch (error) {
                console.error('Ошибка:', error);
                removeTypingIndicator();
                addMessageToChat('❌ Ошибка соединения. Попробуйте ещё раз.', 'assistant', new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'}), 'error');
            } finally {
                isLoading = false;
                document.getElementById('sendButton').disabled = false;
                input.focus();
            }
        }

        function clearHistory() {
            if (confirm('Очистить историю сообщений?')) {
                fetch('/api/clear', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({user_id: user_id})
                }).then(() => {
                    document.getElementById('chatMessages').innerHTML = `
                        <div class="welcome-message">
                            {{ welcome_message }}<br><br>
                            Задайте любой вопрос о поступлении в МТУСИ!
                        </div>
                    `;
                });
            }
        }

        // Фокус на поле ввода при загрузке
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
